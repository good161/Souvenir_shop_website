<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ЧГУ | Боты</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <div class="page-wrapper">
        <a href="../index.html" class="back-button">← На главную</a>
        <div class="brand-header">
            <div class="header-overlay">
                <p>Боты ЧГУ</p>
            </div>
        </div>

        <div class="services-grid">
            <div class="service-card" data-type="freshman">
                <div class="card-accent"></div>
                <div class="card-content">
                    <div class="card-icon">🤖</div>
                    <div class="card-title">Бот первокурсника</div>
                    <span class="card-link">Перейти <span class="arrow">→</span></span>
                </div>
            </div>

            <div class="service-card" data-type="dean">
                <div class="card-accent"></div>
                <div class="card-content">
                    <div class="card-icon">🏛️</div>
                    <div class="card-title">Единый деканат</div>
                    <span class="card-link">Перейти <span class="arrow">→</span></span>
                </div>
            </div>

            <div class="service-card" data-type="support">
                <div class="card-accent"></div>
                <div class="card-content">
                    <div class="card-icon">🛟</div>
                    <div class="card-title">Поддержка студентов</div>
                    <span class="card-link">Перейти <span class="arrow">→</span></span>
                </div>
            </div>

            <div class="service-card" data-type="vuc">
                <div class="card-accent"></div>
                <div class="card-content">
                    <div class="card-icon">⚔️</div>
                    <div class="card-title">ВУЦ бот</div>
                    <span class="card-link">Перейти <span class="arrow">→</span></span>
                </div>
            </div>

            <div class="service-card" data-type="guide">
                <div class="card-accent"></div>
                <div class="card-content">
                    <div class="card-icon">🧭</div>
                    <div class="card-title">Путеводитель по вузу</div>
                    <span class="card-link">Перейти <span class="arrow">→</span></span>
                </div>
            </div>
        </div>

        <div class="footer-note">
            <span>© 2026 ЧГУ | Единая платформа ботов</span>
            <div class="badge-mini">доступно всем пользователям</div>
        </div>
    </div>

    <div id="toastMsg" class="toast-message"></div>

    <script src="bots.js"></script>
</body>
</html>
