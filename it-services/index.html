<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ЧГУ | IT-сервисы</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <div class="page-wrapper">
        <a href="../index.html" class="back-button">← На главную</a>
        <div class="brand-header">
            <div class="header-overlay">
                <p>IT-сервисы ЧГУ</p>
            </div>
        </div>

        <div class="services-grid">
            <div class="service-card" data-type="student">
                <div class="card-accent"></div>
                <div class="card-content">
                    <div class="card-icon">👤</div>
                    <div class="card-title">Личный кабинет</div>
                    <span class="card-link">Перейти <span class="arrow">→</span></span>
                </div>
            </div>

            <div class="service-card" data-type="schedule">
                <div class="card-accent"></div>
                <div class="card-content">
                    <div class="card-icon">🕒</div>
                    <div class="card-title">Расписание</div>
                    <span class="card-link">Перейти <span class="arrow">→</span></span>
                </div>
            </div>

            <div class="service-card" data-type="events">
                <div class="card-accent"></div>
                <div class="card-content">
                    <div class="card-icon">📅</div>
                    <div class="card-title">Мероприятия</div>
                    <span class="card-link">Перейти <span class="arrow">→</span></span>
                </div>
            </div>

            <div class="service-card" data-type="requests">
                <div class="card-accent"></div>
                <div class="card-content">
                    <div class="card-icon">📋</div>
                    <div class="card-title">Электронные услуги</div>
                    <span class="card-link">Перейти <span class="arrow">→</span></span>
                </div>
            </div>

            <div class="service-card" data-type="library">
                <div class="card-accent"></div>
                <div class="card-content">
                    <div class="card-icon">📚</div>
                    <div class="card-title">Электронная библиотека</div>
                    <span class="card-link">Перейти <span class="arrow">→</span></span>
                </div>
            </div>

            <div class="service-card" data-type="mail">
                <div class="card-accent"></div>
                <div class="card-content">
                    <div class="card-icon">✉️</div>
                    <div class="card-title">Корпоративная почта</div>
                    <span class="card-link">Перейти <span class="arrow">→</span></span>
                </div>
            </div>
        </div>

        <div class="footer-note">
            <span>© 2026 ЧГУ | Единая платформа сервисов</span>
            <div class="badge-mini">доступно авторизованным пользователям</div>
        </div>
    </div>

    <div id="toastMsg" class="toast-message"></div>

    <script src="it-services.js"></script>
</body>
</html>
